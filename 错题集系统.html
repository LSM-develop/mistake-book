<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#2c3e66">
    <title>智学错题集 · 跨设备同步版</title>
    <style>
        :root {
            --primary: #2c3e66;
            --primary-light: #3d5a80;
            --accent: #e67e22;
            --bg: #f4f7fc;
            --card-bg: #ffffff;
            --text: #1e2f3e;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --font-sm: 0.8rem;
            --font-md: 0.9rem;
            --font-lg: 1.1rem;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; }
        body {
            font-family: system-ui, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Toast 通知 ──────────────────────── */
        #toastContainer {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            z-index: 10000; display: flex; flex-direction: column; gap: 8px;
            pointer-events: none; width: calc(100% - 32px); max-width: 420px;
        }
        .toast {
            padding: 12px 20px; border-radius: 30px; font-size: var(--font-md); font-weight: 500;
            text-align: center; animation: toastIn 0.3s ease; pointer-events: auto;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15); color: #fff;
        }
        .toast.info { background: #2c3e66; }
        .toast.success { background: #2b6e3c; }
        .toast.error { background: #bc3f2e; }
        .toast.warning { background: #e67e22; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* ── 连接状态 ───────────────────────── */
        #connStatus {
            position: fixed; top: 0; left: 0; right: 0; z-index: 9999; padding: 4px;
            text-align: center; font-size: 0.7rem; font-weight: 600;
            transition: all 0.3s ease;
        }
        #connStatus.online { background: #dff9e6; color: #2b6e3c; }
        #connStatus.offline { background: #ffe3e3; color: #bc3f2e; }

        /* ── 登录容器 ───────────────────────── */
        #authContainer {
            max-width: 440px; margin: 60px auto 0; padding: 0 16px;
        }
        .auth-card {
            background: var(--card-bg); border-radius: 28px; padding: 32px 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid var(--border);
        }
        .auth-card h2 { text-align: center; margin-bottom: 24px; font-size: 1.4rem; color: var(--primary); }
        .auth-card .form-row { margin-bottom: 16px; }
        .auth-card .form-row label { display: block; font-weight: 600; margin-bottom: 6px; font-size: var(--font-sm); color: var(--text-secondary); }
        .auth-card .form-row input { width: 100%; padding: 12px 16px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); font-size: var(--font-md); outline: none; transition: border-color 0.2s; background: #f8fafc; }
        .auth-card .form-row input:focus { border-color: var(--primary); background: #fff; }
        .auth-card .server-row { display: flex; gap: 8px; }
        .auth-card .server-row input { flex: 1; font-size: var(--font-sm); }
        .auth-card .server-row button { white-space: nowrap; padding: 8px 14px; font-size: var(--font-sm); }
        .auth-card .auth-link { text-align: center; margin-top: 16px; font-size: var(--font-sm); }
        .auth-card .auth-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .auth-card .admin-hint { font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 18px; }

        /* ── 主应用 ──────────────────────────── */
        .app-container { max-width: 1400px; margin: 0 auto; padding: 0 16px; }

        .header {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            gap: 12px; background: var(--card-bg); padding: 12px 20px; border-radius: 20px;
            box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 16px;
            position: sticky; top: 8px; z-index: 100;
        }
        .header h1 { font-size: 1.25rem; white-space: nowrap; }
        .header h1 .gradient-text {
            background: linear-gradient(135deg, #2b5876, #4e4376);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .user-info { display: flex; align-items: center; gap: 10px; background: #f1f5f9; padding: 6px 14px; border-radius: 30px; font-size: var(--font-sm); }
        .user-info span { font-weight: 600; color: var(--primary); }
        .readonly-badge {
            background: #fef3c7; color: #92400e; padding: 3px 12px; border-radius: 20px;
            font-size: 0.7rem; font-weight: 600; white-space: nowrap;
        }

        /* ── 筛选栏 ──────────────────────────── */
        .filter-bar {
            background: var(--card-bg); border-radius: 20px; padding: 12px 18px;
            margin-bottom: 16px; box-shadow: var(--shadow); border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .filter-bar-inner {
            display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center;
        }
        .filter-group {
            display: flex; align-items: center; gap: 6px;
            background: #f8fafc; padding: 5px 12px; border-radius: 24px;
            border: 1px solid var(--border);
        }
        .filter-group label { font-weight: 600; font-size: var(--font-sm); color: #475569; white-space: nowrap; }
        .filter-group select, .filter-group input {
            border: none; background: transparent; padding: 4px 6px; font-size: var(--font-sm);
            outline: none; font-weight: 500; color: var(--text);
        }
        .filter-group select { min-width: 60px; }
        .search-input { min-width: 150px; flex: 1; }
        .filter-toggle { display: none; width: 100%; text-align: center; font-size: var(--font-sm); font-weight: 600; color: var(--primary); cursor: pointer; padding: 4px; }

        /* ── 按钮 ──────────────────────────────── */
        button {
            border: none; padding: 8px 18px; border-radius: 24px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; font-size: var(--font-sm);
            display: inline-flex; align-items: center; gap: 4px;
            min-height: 40px; white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        button:active { transform: scale(0.96); }
        button.primary { background: var(--primary); color: #fff; }
        button.primary:hover { background: var(--primary-light); }
        button.outline { background: #fff; color: var(--primary); border: 1.5px solid #cbd5e1; }
        button.outline:hover { border-color: var(--primary); }
        button.accent { background: var(--accent); color: #fff; }
        button.danger { background: #dc3545; color: #fff; }
        button.small { padding: 4px 12px; min-height: 32px; font-size: 0.7rem; }
        button.block { width: 100%; justify-content: center; }
        button:disabled { opacity: 0.5; pointer-events: none; }

        /* ── 隐藏的文件输入 ──────────────────── */
        .hidden-file-input { display: none; }

        /* ── 桌面：表格布局 ──────────────────── */
        .questions-table-wrapper {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            box-shadow: var(--shadow); border: 1px solid var(--border);
        }
        .desktop-table { width: 100%; border-collapse: collapse; min-width: 900px; }
        .desktop-table th {
            text-align: left; padding: 14px 12px; background: #f9fbfe; font-weight: 600;
            color: #475569; font-size: var(--font-sm); border-bottom: 1px solid var(--border);
        }
        .desktop-table td {
            padding: 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; font-size: var(--font-sm);
        }
        .desktop-table tbody tr:hover { background: #f8fafc; }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 16px;
            font-size: 0.7rem; font-weight: 600;
        }
        .badge-subject { background: #e9f0f9; color: #2c3e66; }
        .badge-category { background: #f1f5f9; color: #475569; }
        .badge-knowledge { background: #e6f7f0; color: #1f6e43; }
        .badge-level { min-width: 48px; text-align: center; }
        .badge-easy { background: #dff9e6; color: #2b6e3c; }
        .badge-medium { background: #fff0db; color: #b95b0e; }
        .badge-hard { background: #ffe3e3; color: #bc3f2e; }
        .star-icon { cursor: pointer; font-size: 1.1rem; color: #cbd5e1; transition: color 0.2s; user-select: none; }
        .star-icon.active { color: #f5b042; }
        .action-icons { display: flex; gap: 8px; align-items: center; }
        .action-icons span { cursor: pointer; font-size: 1rem; opacity: 0.6; transition: opacity 0.2s; padding: 4px; }
        .action-icons span:hover { opacity: 1; }

        /* ── 移动端：卡片布局 ────────────────── */
        .card-list { display: none; flex-direction: column; gap: 10px; }
        .question-card {
            background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
            cursor: pointer; transition: all 0.15s;
        }
        .question-card:active { background: #f8fafc; transform: scale(0.985); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .card-body { font-size: var(--font-sm); color: var(--text); line-height: 1.5; margin-bottom: 6px; }
        .card-body .preview { max-height: 48px; overflow: hidden; color: #475569; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; font-size: 0.7rem; color: #94a3b8; }
        .card-actions { display: flex; gap: 12px; }
        .card-actions span { font-size: 1.1rem; cursor: pointer; padding: 4px; }
        .empty-state { text-align: center; padding: 48px 20px; color: #94a3b8; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

        /* ── 分页 ──────────────────────────────── */
        .pagination {
            display: flex; justify-content: center; align-items: center; gap: 16px;
            padding: 16px; border-top: 1px solid #f1f5f9;
        }
        .pagination span { font-size: var(--font-sm); font-weight: 600; color: var(--text-secondary); }

        /* ── 提示文字 ────────────────────────── */
        #viewModeHint { text-align: right; margin-top: 8px; font-size: 0.7rem; }

        /* ── 模态框 ──────────────────────────── */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
            z-index: 2000; padding: 16px;
        }
        .modal-content {
            background: var(--card-bg); border-radius: 24px; padding: 24px 28px;
            width: 100%; max-height: 85vh; overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }
        .modal-content h2 { margin-bottom: 20px; color: var(--primary); }
        .form-row { margin-bottom: 16px; }
        .form-row label { display: block; font-weight: 600; margin-bottom: 6px; font-size: var(--font-sm); color: #475569; }
        .form-row input, .form-row textarea, .form-row select {
            width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
            border: 1.5px solid var(--border); font-size: var(--font-md); outline: none;
            transition: border-color 0.2s; font-family: inherit; background: #f8fafc;
        }
        .form-row input:focus, .form-row textarea:focus, .form-row select:focus { border-color: var(--primary); background: #fff; }
        .form-row textarea { min-height: 80px; resize: vertical; }
        .flex-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .img-preview { max-width: 100%; max-height: 200px; border-radius: var(--radius-xs); margin-top: 8px; display: block; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; }
        .checkbox-row input[type="checkbox"] { width: auto; width: 18px; height: 18px; accent-color: var(--primary); }

        /* ── 详情模态框 ──────────────────────── */
        .detail-content { line-height: 1.8; }
        .detail-content h3 { color: var(--primary); margin-bottom: 12px; }
        .detail-content .detail-img { max-width: 100%; max-height: 300px; border-radius: var(--radius-xs); margin: 10px 0; display: block; }
        .detail-content .detail-label { font-weight: 600; color: var(--text-secondary); font-size: var(--font-sm); }

        /* ── 管理表格 ────────────────────────── */
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: var(--font-sm); }
        .admin-table th, .admin-table td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; }
        .admin-table th { background: #f9fbfe; font-weight: 600; }

        /* ── 移动端适配 ──────────────────── */
        @media (max-width: 768px) {
            body { font-size: 15px; }
            .app-container { padding: 0 10px; }

            /* Header */
            .header { padding: 10px 14px; border-radius: 16px; gap: 8px; }
            .header h1 { font-size: 1.05rem; }
            .user-info { padding: 4px 10px; gap: 6px; font-size: 0.7rem; }
            .user-info button { min-height: 32px; padding: 4px 10px; font-size: 0.7rem; }

            /* 筛选栏可折叠 */
            .filter-bar { padding: 10px 14px; border-radius: 16px; }
            .filter-bar-inner { gap: 8px; }
            .filter-group { padding: 4px 8px; font-size: 0.7rem; }
            .filter-group label { font-size: 0.7rem; }
            .filter-group select, .filter-group input { font-size: 0.7rem; padding: 2px 4px; }
            .search-input { min-width: 100px; }
            .filter-toggle { display: block; }
            .filter-collapsed .filter-bar-inner { display: none; }

            /* 隐藏表格，显示卡片 */
            .desktop-table { display: none; }
            .card-list { display: flex; }
            .questions-table-wrapper { box-shadow: none; background: transparent; border: none; }
            .pagination { padding: 12px; }

            /* 模态框全屏 */
            .modal { padding: 0; align-items: flex-end; }
            .modal-content {
                border-radius: 24px 24px 0 0; max-height: 92vh; width: 100%; padding: 20px 18px;
                padding-bottom: calc(20px + var(--safe-bottom));
            }
            .form-row input, .form-row textarea, .form-row select { font-size: 16px; } /* 防止 iOS 缩放 */

            /* 按钮更大 */
            button { min-height: 44px; padding: 10px 20px; font-size: 0.85rem; }
            button.small { min-height: 36px; padding: 6px 14px; }

            /* 登录卡片 */
            #authContainer { margin-top: 20px; }
            .auth-card { border-radius: 20px; padding: 24px 16px; }

            /* 管理表格可滚动 */
            .admin-table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        }

        /* ── 极小屏 (<400px) ──────────── */
        @media (max-width: 400px) {
            .header h1 { font-size: 0.95rem; }
            .header { padding: 8px 10px; }
            .filter-bar { padding: 8px 10px; }
            .filter-group { padding: 3px 6px; }
            .filter-group label { font-size: 0.65rem; }
            button { min-height: 40px; padding: 8px 14px; font-size: 0.75rem; }
        }

        /* ── 打印样式 ──────────────────────── */
        @media print {
            body { background: #fff; }
            .header, .filter-bar, .pagination, #connStatus, #toastContainer,
            .action-icons, .card-actions, button, .filter-toggle { display: none !important; }
            .questions-table-wrapper { box-shadow: none; border: none; }
            .desktop-table { min-width: auto; display: table !important; }
            .card-list { display: none !important; }
            .desktop-table th, .desktop-table td { border: 1px solid #ddd; }
            .app-container { max-width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<!-- 连接状态条 -->
<div id="connStatus" style="display:none;"></div>

<!-- Toast 通知容器 -->
<div id="toastContainer"></div>

<!-- ========== 登录/注册 ========== -->
<div id="authContainer">
    <div class="auth-card">
        <h2>📚 智学错题集</h2>
        <div class="form-row">
            <label>🌐 服务器地址</label>
            <div class="server-row">
                <input type="text" id="serverUrl" placeholder="http://localhost:3030">
                <button class="outline small" id="testServerBtn">测试连接</button>
            </div>
            <div style="font-size:0.65rem;color:#94a3b8;margin-top:4px;" id="serverHint">留空则使用本地离线模式</div>
        </div>
        <div id="loginPanel">
            <div class="form-row"><label>👤 用户名</label><input type="text" id="loginUsername" placeholder="用户名" autocomplete="username"></div>
            <div class="form-row"><label>🔒 密码</label><input type="password" id="loginPassword" placeholder="密码" autocomplete="current-password"></div>
            <button id="doLoginBtn" class="primary block">登 录</button>
            <p class="auth-link">没有账号？<a href="#" id="showRegisterBtn">立即注册</a></p>
        </div>
        <div id="registerPanel" style="display:none;">
            <div class="form-row"><label>👤 用户名</label><input type="text" id="regUsername" placeholder="2-20个字符" autocomplete="username"></div>
            <div class="form-row"><label>🔒 密码</label><input type="password" id="regPassword" placeholder="至少4个字符" autocomplete="new-password"></div>
            <button id="doRegisterBtn" class="primary block">注 册</button>
            <p class="auth-link"><a href="#" id="backToLoginBtn">← 返回登录</a></p>
        </div>
        <p class="admin-hint">💡 默认管理员: admin / admin123</p>
    </div>
</div>

<!-- ========== 主应用 ========== -->
<div id="mainApp" style="display:none;">
    <div class="app-container">
        <div class="header">
            <h1><span class="gradient-text">📚 智学错题集</span></h1>
            <div class="user-info">
                <span>👤 <span id="currentUsername"></span></span>
                <span style="font-size:0.7rem;color:#94a3b8;" id="currentRole"></span>
                <button id="logoutBtn" class="small outline">退出</button>
                <button id="adminPanelBtn" class="small accent" style="display:none;">👑 管理</button>
            </div>
        </div>

        <div class="filter-bar filter-collapsed" id="filterBar">
            <div class="filter-toggle" id="filterToggle">🔍 筛选与搜索 ▾</div>
            <div class="filter-bar-inner">
                <div class="filter-group"><label>📚</label><select id="filterSubject"><option value="all">全部科目</option></select></div>
                <div class="filter-group"><label>⭐</label><select id="filterLevel"><option value="all">全部难度</option><option value="easy">简单</option><option value="medium">中等</option><option value="hard">困难</option></select></div>
                <div class="filter-group"><label>🔖</label><select id="filterImportant"><option value="all">全部</option><option value="true">仅重点</option><option value="false">非重点</option></select></div>
                <div class="filter-group" style="flex:1;"><input type="text" id="searchInput" placeholder="🔍 搜索题目/解析/知识点..." class="search-input"></div>
                <button id="newQuestionBtn" class="primary">＋ 新建错题</button>
                <button id="printPdfBtn" class="outline">🖨️ 打印</button>
                <button id="exportBackupBtn" class="outline">📦 导出</button>
                <button id="importBackupBtn" class="outline">📂 导入</button>
                <div class="filter-group">
                    <label>🔍</label>
                    <input type="text" id="exploreUsername" placeholder="查看他人用户名" style="min-width:110px;">
                    <button id="exploreBtn" class="small outline">查看</button>
                </div>
            </div>
        </div>

        <!-- 错题展示区 -->
        <div style="text-align:right; margin-bottom:8px;">
            <span id="viewModeHint"></span>
            <span id="resultCount" style="font-size:0.7rem;color:#94a3b8;"></span>
        </div>

        <!-- 桌面表格 -->
        <div class="questions-table-wrapper">
            <table class="desktop-table" id="desktopTable">
                <thead>
                    <tr>
                        <th>科目</th><th>题目预览</th><th>分类</th><th>知识点</th><th>难度</th><th>重点</th><th>时间</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody"><tr><td colspan="8" style="text-align:center;">✨ 加载中...</td></tr></tbody>
            </table>

            <!-- 移动端卡片列表 -->
            <div class="card-list" id="cardList"></div>

            <!-- 分页 -->
            <div class="pagination" id="paginationArea"></div>
        </div>
    </div>
</div>

<!-- ========== 错题编辑模态框 ========== -->
<div id="questionModal" class="modal">
    <div class="modal-content" style="max-width:700px;">
        <h2 id="modalTitle">📝 新建错题</h2>
        <input type="hidden" id="editId">
        <div class="form-row">
            <label>📚 科目 *</label>
            <div style="display:flex;gap:8px;">
                <select id="modalSubject" style="flex:1;"></select>
                <button type="button" id="addSubjectBtn" class="small outline">＋新增</button>
            </div>
        </div>
        <div class="form-row"><label>📂 分类（题型）</label><input type="text" id="modalCategory" placeholder="选择题 / 填空题 / 解答题 ..."></div>
        <div class="form-row"><label>🧠 知识点（逗号分隔）</label><input type="text" id="modalKnowledge" placeholder="例如：二次函数, 欧姆定律"></div>
        <div class="form-row"><label>⭐ 难度分级</label><select id="modalLevel"><option value="easy">🟢 简单</option><option value="medium" selected>🟡 中等</option><option value="hard">🔴 困难</option></select></div>
        <div class="form-row"><label>📄 题目内容</label><textarea id="modalQuestionText" placeholder="输入原题描述..."></textarea></div>
        <div class="form-row">
            <label>📸 拍照 / 配图</label>
            <input type="file" id="modalImageFile" accept="image/*" capture="environment">
            <div id="imagePreviewContainer"></div>
            <div style="font-size:0.65rem;color:#94a3b8;margin-top:4px;">📱 手机上点击可直接拍照，图片会自动压缩</div>
        </div>
        <div class="form-row"><label>📖 解析 / 错因分析</label><textarea id="modalAnalysis" placeholder="正确解析和错误原因..."></textarea></div>
        <div class="form-row checkbox-row"><input type="checkbox" id="modalImportant"><label for="modalImportant" style="margin:0;">⭐ 标记为重点错题</label></div>
        <div class="flex-btns">
            <button id="cancelModalBtn" class="outline">取消</button>
            <button id="saveQuestionBtn" class="primary">💾 保存</button>
        </div>
    </div>
</div>

<!-- ========== 详情查看模态框 ========== -->
<div id="detailModal" class="modal">
    <div class="modal-content" style="max-width:600px;">
        <div class="detail-content" id="detailContent"></div>
        <div class="flex-btns"><button id="closeDetailBtn" class="primary">关闭</button></div>
    </div>
</div>

<!-- ========== 管理后台模态框 ========== -->
<div id="adminModal" class="modal">
    <div class="modal-content" style="max-width:850px;">
        <h2>👑 用户管理</h2>
        <div class="admin-table-wrapper">
            <div id="adminUserList">加载中...</div>
        </div>
        <div class="flex-btns"><button id="closeAdminModal" class="primary">关闭</button></div>
    </div>
</div>

<!-- ========== 所有 JS 逻辑 ========== -->
<script>
(function() {
    'use strict';

    // ───────── 配置 ─────────────────────────────────────
    const PAGE_SIZE = 15;
    const DEFAULT_SUBJECTS = ['数学','语文','英语','物理','化学','生物','历史','地理','政治'];
    const IMG_MAX_WIDTH = 800;
    const IMG_QUALITY = 0.7;

    // ───────── DOM 引用缓存 ────────────────────────────
    const $ = id => document.getElementById(id);
    const dom = {
        // Auth
        authContainer: $('authContainer'), mainApp: $('mainApp'),
        loginPanel: $('loginPanel'), registerPanel: $('registerPanel'),
        loginUsername: $('loginUsername'), loginPassword: $('loginPassword'),
        regUsername: $('regUsername'), regPassword: $('regPassword'),
        serverUrl: $('serverUrl'), serverHint: $('serverHint'),
        // Header
        currentUsername: $('currentUsername'), currentRole: $('currentRole'),
        adminPanelBtn: $('adminPanelBtn'),
        // Filter
        filterSubject: $('filterSubject'), filterLevel: $('filterLevel'),
        filterImportant: $('filterImportant'), searchInput: $('searchInput'),
        filterToggle: $('filterToggle'), filterBar: $('filterBar'),
        // Table/Card
        tableBody: $('tableBody'), cardList: $('cardList'),
        paginationArea: $('paginationArea'), viewModeHint: $('viewModeHint'),
        resultCount: $('resultCount'),
        // Explore
        exploreUsername: $('exploreUsername'), exploreBtn: $('exploreBtn'),
        // Modal
        questionModal: $('questionModal'), detailModal: $('detailModal'),
        adminModal: $('adminModal'),
        editId: $('editId'), modalTitle: $('modalTitle'),
        modalSubject: $('modalSubject'), modalCategory: $('modalCategory'),
        modalKnowledge: $('modalKnowledge'), modalLevel: $('modalLevel'),
        modalQuestionText: $('modalQuestionText'), modalAnalysis: $('modalAnalysis'),
        modalImportant: $('modalImportant'), modalImageFile: $('modalImageFile'),
        imagePreviewContainer: $('imagePreviewContainer'),
        detailContent: $('detailContent'), adminUserList: $('adminUserList'),
        // Status
        connStatus: $('connStatus'),
    };

    // ───────── 全局状态 ────────────────────────────────
    let state = {
        serverUrl: '',
        token: null,
        currentUser: null,
        useServer: false,
        viewMode: 'self',   // 'self' | 'other'
        viewedUserId: null,
        viewedUserName: '',
        allQuestions: [],
        filteredQuestions: [],
        currentSubjects: [],
        currentPage: 1,
        currentImageDataUrl: null,
        currentEditImageId: null,
    };

    // ───────── 工具函数 ────────────────────────────────
    function escapeHtml(str) {
        if (!str) return '';
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
        return str.replace(/[&<>"']/g, m => map[m]);
    }

    function formatTime(ts) {
        const d = new Date(ts);
        const pad = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function toast(msg, type = 'info', duration = 2500) {
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.textContent = msg;
        dom.toastContainer = dom.toastContainer || $('toastContainer');
        dom.toastContainer.appendChild(el);
        setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, duration);
    }

    function showConnStatus(status, msg) {
        const el = dom.connStatus;
        el.style.display = 'block';
        el.className = status;
        el.textContent = msg;
        if (status === 'online') setTimeout(() => { el.style.display = 'none'; }, 2000);
    }

    function setLoading(loading) {
        if (loading) {
            dom.tableBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">⏳ 同步数据中...</td></tr>';
            dom.cardList.innerHTML = '<div class="empty-state"><div class="icon">⏳</div>同步数据中...</div>';
        }
    }

    // ───────── 图片压缩 ────────────────────────────────
    function compressImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    let { width, height } = img;
                    if (width <= IMG_MAX_WIDTH) {
                        resolve(e.target.result);
                        return;
                    }
                    const ratio = IMG_MAX_WIDTH / width;
                    width = IMG_MAX_WIDTH;
                    height = Math.round(height * ratio);

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', IMG_QUALITY));
                };
                img.onerror = () => reject(new Error('图片加载失败'));
                img.src = e.target.result;
            };
            reader.onerror = () => reject(new Error('文件读取失败'));
            reader.readAsDataURL(file);
        });
    }

    // ───────── API 客户端 ──────────────────────────────
    const api = {
        getHeaders() {
            const h = { 'Content-Type': 'application/json' };
            if (state.token) h['Authorization'] = `Bearer ${state.token}`;
            return h;
        },

        async request(method, path, body = null) {
            const url = state.serverUrl.replace(/\/+$/, '') + path;
            const opts = { method, headers: this.getHeaders() };
            if (body) opts.body = JSON.stringify(body);

            const res = await fetch(url, opts);
            const data = await res.json();

            if (!res.ok) {
                throw new Error(data.error || `请求失败 (${res.status})`);
            }
            return data;
        },

        // Auth
        async register(username, password) {
            return this.request('POST', '/api/auth/register', { username, password });
        },
        async login(username, password) {
            return this.request('POST', '/api/auth/login', { username, password });
        },
        async checkToken() {
            return this.request('GET', '/api/auth/me');
        },

        // Questions
        async getQuestions() {
            return this.request('GET', '/api/questions');
        },
        async saveQuestion(q) {
            return this.request('POST', '/api/questions', {
                id: q.id, subject: q.subject, category: q.category || '',
                knowledgePoints: q.knowledgePoints || '', level: q.level,
                questionText: q.questionText || '', analysis: q.analysis || '',
                important: q.important, imageId: q.imageId || null, createTime: q.createTime
            });
        },
        async updateQuestion(id, q) {
            return this.request('PUT', `/api/questions/${id}`, {
                subject: q.subject, category: q.category || '',
                knowledgePoints: q.knowledgePoints || '', level: q.level,
                questionText: q.questionText || '', analysis: q.analysis || '',
                important: q.important, imageId: q.imageId || null
            });
        },
        async deleteQuestion(id) {
            return this.request('DELETE', `/api/questions/${id}`);
        },

        // Subjects
        async getSubjects() {
            return this.request('GET', '/api/subjects');
        },
        async updateSubjects(subjects) {
            return this.request('PUT', '/api/subjects', { subjects });
        },

        // Images
        async uploadImage(id, data) {
            return this.request('POST', '/api/images', { id, data });
        },
        async getImage(id) {
            return this.request('GET', `/api/images/${id}`);
        },
        async deleteImage(id) {
            return this.request('DELETE', `/api/images/${id}`);
        },

        // Explore
        async getExploreUsers() {
            return this.request('GET', '/api/explore/users');
        },
        async getExploreQuestions(userId) {
            return this.request('GET', `/api/explore/${userId}/questions`);
        },
        async getExploreImage(userId, imgId) {
            return this.request('GET', `/api/explore/${userId}/images/${imgId}`);
        },

        // Backup
        async exportBackup() {
            return this.request('POST', '/api/backup/export');
        },
        async importBackup(data) {
            return this.request('POST', '/api/backup/import', data);
        },

        // Admin
        async getAdminUsers() {
            return this.request('GET', '/api/admin/users');
        },
        async deleteUser(id) {
            return this.request('DELETE', `/api/admin/users/${id}`);
        },
    };

    // ───────── 本地存储降级 ────────────────────────────
    const LOCAL_KEYS = {
        users: 'mistake_users',
        data: (id) => `mistake_data_${id}`,
        subjects: (id) => `subjects_${id}`,
        images: (id) => `mistake_images_${id}`,
    };

    const localStore = {
        initUsers() {
            if (!localStorage.getItem(LOCAL_KEYS.users)) {
                localStorage.setItem(LOCAL_KEYS.users, JSON.stringify([
                    { id: 1, username: 'admin', password: 'admin123', role: 'admin' }
                ]));
            }
        },
        getUsers() { return JSON.parse(localStorage.getItem(LOCAL_KEYS.users) || '[]'); },
        saveUsers(u) { localStorage.setItem(LOCAL_KEYS.users, JSON.stringify(u)); },
        register(username, password) {
            const users = this.getUsers();
            if (users.find(u => u.username === username)) throw new Error('用户名已存在');
            const id = users.length ? Math.max(...users.map(u => u.id)) + 1 : 2;
            users.push({ id, username, password, role: 'user' });
            this.saveUsers(users);
            localStorage.setItem(LOCAL_KEYS.data(id), '[]');
            localStorage.setItem(LOCAL_KEYS.subjects(id), JSON.stringify(DEFAULT_SUBJECTS));
            return { id, username, role: 'user' };
        },
        login(username, password) {
            const u = this.getUsers().find(u => u.username === username && u.password === password);
            if (!u) throw new Error('用户名或密码错误');
            return u;
        },
        getQuestions(userId) {
            return JSON.parse(localStorage.getItem(LOCAL_KEYS.data(userId)) || '[]');
        },
        saveQuestions(userId, questions) {
            localStorage.setItem(LOCAL_KEYS.data(userId), JSON.stringify(questions));
        },
        getSubjects(userId) {
            const s = localStorage.getItem(LOCAL_KEYS.subjects(userId));
            return s ? JSON.parse(s) : [...DEFAULT_SUBJECTS];
        },
        saveSubjects(userId, subjects) {
            localStorage.setItem(LOCAL_KEYS.subjects(userId), JSON.stringify(subjects));
        },
        getImages(userId) {
            return JSON.parse(localStorage.getItem(LOCAL_KEYS.images(userId)) || '{}');
        },
        saveImage(userId, id, dataUrl) {
            const imgs = this.getImages(userId);
            imgs[id] = dataUrl;
            localStorage.setItem(LOCAL_KEYS.images(userId), JSON.stringify(imgs));
        },
        deleteImage(userId, id) {
            const imgs = this.getImages(userId);
            delete imgs[id];
            localStorage.setItem(LOCAL_KEYS.images(userId), JSON.stringify(imgs));
        },
    };

    // ───────── 数据加载 ────────────────────────────────
    async function loadAllQuestions() {
        if (state.viewMode === 'self') {
            if (state.useServer) {
                try {
                    const res = await api.getQuestions();
                    state.allQuestions = res.questions.map(q => ({
                        ...q,
                        knowledgePoints: q.knowledge_points !== undefined ? q.knowledge_points : (q.knowledgePoints || ''),
                    }));
                } catch (e) {
                    toast('服务器同步失败，切换到本地模式', 'warning');
                    state.useServer = false;
                    state.allQuestions = localStore.getQuestions(state.currentUser.id).map(q => ({ ...q, knowledgePoints: q.knowledgePoints || '' }));
                }
            } else {
                state.allQuestions = localStore.getQuestions(state.currentUser.id).map(q => ({ ...q, knowledgePoints: q.knowledgePoints || '' }));
            }
        } else {
            // 查看他人
            if (state.useServer) {
                try {
                    const res = await api.getExploreQuestions(state.viewedUserId);
                    state.allQuestions = res.questions.map(q => ({
                        ...q,
                        knowledgePoints: q.knowledge_points !== undefined ? q.knowledge_points : (q.knowledgePoints || ''),
                    }));
                } catch (e) {
                    toast('无法获取他人数据', 'error');
                    switchToSelfMode();
                    return;
                }
            } else {
                state.allQuestions = localStore.getQuestions(state.viewedUserId).map(q => ({ ...q, knowledgePoints: q.knowledgePoints || '' }));
                state.currentSubjects = localStore.getSubjects(state.viewedUserId);
            }
        }
    }

    async function loadSubjects() {
        if (state.viewMode === 'self') {
            if (state.useServer) {
                try {
                    const res = await api.getSubjects();
                    state.currentSubjects = res.subjects;
                } catch (e) {
                    state.currentSubjects = localStore.getSubjects(state.currentUser.id);
                }
            } else {
                state.currentSubjects = localStore.getSubjects(state.currentUser.id);
            }
        } else {
            if (state.useServer) {
                // 探索模式下从 allQuestions 提取科目
                const subjects = [...new Set(state.allQuestions.map(q => q.subject))];
                state.currentSubjects = subjects.length ? subjects : [...DEFAULT_SUBJECTS];
            } else {
                state.currentSubjects = localStore.getSubjects(state.viewedUserId);
            }
        }
    }

    async function saveAllQuestions() {
        if (state.viewMode !== 'self') return;
        if (state.useServer) {
            // 服务器模式下每条错题已单独保存，此处不需要批量保存
            // 但为了兼容，遍历保存
            try {
                for (const q of state.allQuestions) {
                    await api.saveQuestion(q);
                }
            } catch (e) {
                toast('同步保存失败，请检查网络', 'error');
            }
        } else {
            localStore.saveQuestions(state.currentUser.id, state.allQuestions);
        }
    }

    // ───────── 渲染 ────────────────────────────────────
    function applyFilter() {
        let filtered = [...state.allQuestions];
        const subj = dom.filterSubject.value;
        if (subj !== 'all') filtered = filtered.filter(q => q.subject === subj);
        const lvl = dom.filterLevel.value;
        if (lvl !== 'all') filtered = filtered.filter(q => q.level === lvl);
        const imp = dom.filterImportant.value;
        if (imp !== 'all') filtered = filtered.filter(q => q.important === (imp === 'true'));
        const keyword = dom.searchInput.value.trim().toLowerCase();
        if (keyword) {
            filtered = filtered.filter(q =>
                (q.questionText || '').toLowerCase().includes(keyword) ||
                (q.analysis || '').toLowerCase().includes(keyword) ||
                (q.category || '').toLowerCase().includes(keyword) ||
                (q.knowledgePoints || '').toLowerCase().includes(keyword)
            );
        }
        state.filteredQuestions = filtered;
        state.currentPage = 1;
    }

    function renderAll() {
        applyFilter();
        const total = state.filteredQuestions.length;
        const totalPages = Math.ceil(total / PAGE_SIZE);
        if (state.currentPage > totalPages) state.currentPage = Math.max(1, totalPages);
        const start = (state.currentPage - 1) * PAGE_SIZE;
        const pageItems = state.filteredQuestions.slice(start, start + PAGE_SIZE);

        // 结果计数
        dom.resultCount.textContent = total ? `共 ${total} 条` : '';

        // 桌面表格
        renderTable(pageItems, total);
        // 移动卡片
        renderCards(pageItems, total);
        // 分页
        renderPagination(total, totalPages);
        // 科目下拉
        refreshSubjectSelects();
    }

    function renderTable(items, total) {
        if (items.length === 0) {
            dom.tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:32px;">📭 ${total ? '无匹配结果' : '暂无错题，点击「＋新建错题」开始记录'}</td></tr>`;
            return;
        }
        dom.tableBody.innerHTML = items.map(q => {
            const preview = q.questionText ? (q.questionText.length > 45 ? q.questionText.substring(0, 45) + '...' : q.questionText) : '（无内容）';
            const kp = q.knowledgePoints ? (q.knowledgePoints.length > 22 ? q.knowledgePoints.substring(0, 22) + '…' : q.knowledgePoints) : '未填';
            const levelMap = { easy: ['badge-easy', '简单'], medium: ['badge-medium', '中等'], hard: ['badge-hard', '困难'] };
            const [lvlClass, lvlName] = levelMap[q.level] || levelMap.medium;
            const starClass = q.important ? 'active' : '';
            const isSelf = state.viewMode === 'self';
            const actions = isSelf
                ? `<span class="view-detail" data-id="${q.id}">👁️</span><span class="edit-question" data-id="${q.id}">✏️</span><span class="delete-question" data-id="${q.id}">🗑️</span>`
                : `<span class="view-detail" data-id="${q.id}">👁️</span><span style="opacity:0.4;">🔒</span>`;
            return `<tr>
                <td><span class="badge badge-subject">${escapeHtml(q.subject)}</span></td>
                <td><div style="max-width:280px;">${escapeHtml(preview)}</div></td>
                <td><span class="badge badge-category">${escapeHtml(q.category || '未分类')}</span></td>
                <td><span class="badge badge-knowledge">${escapeHtml(kp)}</span></td>
                <td><span class="badge badge-level ${lvlClass}">${lvlName}</span></td>
                <td><span class="star-icon ${starClass}" data-id="${q.id}">⭐</span></td>
                <td style="font-size:0.75rem;color:#94a3b8;">${formatTime(q.createTime)}</td>
                <td><div class="action-icons">${actions}</div></td>
            </tr>`;
        }).join('');

        // 绑定行事件
        bindTableEvents();
    }

    function renderCards(items, total) {
        if (items.length === 0) {
            dom.cardList.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div>${total ? '无匹配结果' : '暂无错题'}</div><div style="font-size:0.75rem;margin-top:4px;">点击下方「＋新建错题」开始记录</div></div>`;
            return;
        }
        dom.cardList.innerHTML = items.map(q => {
            const preview = q.questionText ? (q.questionText.length > 60 ? q.questionText.substring(0, 60) + '...' : q.questionText) : '（无内容）';
            const levelMap = { easy: '🟢', medium: '🟡', hard: '🔴' };
            const levelEmoji = levelMap[q.level] || '🟡';
            const starIcon = q.important ? '⭐' : '☆';
            const isSelf = state.viewMode === 'self';
            const actions = isSelf
                ? `<span class="edit-question" data-id="${q.id}">✏️</span><span class="delete-question" data-id="${q.id}">🗑️</span>`
                : `<span style="opacity:0.4;">🔒 只读</span>`;
            return `<div class="question-card" data-id="${q.id}">
                <div class="card-header">
                    <div class="card-tags">
                        <span class="badge badge-subject">${escapeHtml(q.subject)}</span>
                        <span class="badge badge-level badge-${q.level}">${levelEmoji} ${q.level==='easy'?'简单':q.level==='hard'?'困难':'中等'}</span>
                        ${q.category ? `<span class="badge badge-category">${escapeHtml(q.category)}</span>` : ''}
                    </div>
                    <span style="font-size:1.2rem;cursor:pointer;" class="star-icon-card ${q.important ? 'active' : ''}" data-id="${q.id}">${starIcon}</span>
                </div>
                <div class="card-body"><div class="preview">${escapeHtml(preview)}</div></div>
                <div class="card-footer">
                    <span>${formatTime(q.createTime)}</span>
                    <div class="card-actions">${actions}</div>
                </div>
            </div>`;
        }).join('');

        // 绑定卡片事件
        bindCardEvents();
    }

    function bindTableEvents() {
        // 重点星标
        dom.tableBody.querySelectorAll('.star-icon').forEach(s => {
            s.onclick = (e) => { e.stopPropagation(); toggleImportant(Number(s.dataset.id)); };
        });
        // 查看详情
        dom.tableBody.querySelectorAll('.view-detail').forEach(b => {
            b.onclick = () => showDetailModal(Number(b.dataset.id));
        });
        if (state.viewMode === 'self') {
            dom.tableBody.querySelectorAll('.edit-question').forEach(b => {
                b.onclick = () => openEditModal(Number(b.dataset.id));
            });
            dom.tableBody.querySelectorAll('.delete-question').forEach(b => {
                b.onclick = () => deleteQuestion(Number(b.dataset.id));
            });
        }
    }

    function bindCardEvents() {
        // 卡片点击查看详情
        dom.cardList.querySelectorAll('.question-card').forEach(card => {
            card.onclick = (e) => {
                // 如果点击的是操作按钮则不触发
                if (e.target.closest('.edit-question') || e.target.closest('.delete-question') || e.target.closest('.star-icon-card')) return;
                showDetailModal(Number(card.dataset.id));
            };
        });
        // 星标
        dom.cardList.querySelectorAll('.star-icon-card').forEach(s => {
            s.onclick = (e) => { e.stopPropagation(); toggleImportant(Number(s.dataset.id)); };
        });
        if (state.viewMode === 'self') {
            dom.cardList.querySelectorAll('.edit-question').forEach(b => {
                b.onclick = (e) => { e.stopPropagation(); openEditModal(Number(b.dataset.id)); };
            });
            dom.cardList.querySelectorAll('.delete-question').forEach(b => {
                b.onclick = (e) => { e.stopPropagation(); deleteQuestion(Number(b.dataset.id)); };
            });
        }
    }

    function renderPagination(total, totalPages) {
        if (totalPages <= 1) { dom.paginationArea.innerHTML = ''; return; }
        dom.paginationArea.innerHTML = `
            <button id="prevPage" ${state.currentPage === 1 ? 'disabled' : ''}>◀ 上一页</button>
            <span>${state.currentPage} / ${totalPages}</span>
            <button id="nextPage" ${state.currentPage === totalPages ? 'disabled' : ''}>下一页 ▶</button>
        `;
        $('prevPage')?.addEventListener('click', () => { if (state.currentPage > 1) { state.currentPage--; renderAll(); } });

    function refreshSubjectSelects() {
        const subs = state.currentSubjects;
        const opts = subs.map(s => `<option value="${s}">${s}</option>`).join('');
        dom.modalSubject.innerHTML = opts;
        const fv = dom.filterSubject.value;
        dom.filterSubject.innerHTML = '<option value="all">全部科目</option>' + opts;

    // ───────── 错题操作 ────────────────────────────────
    async function toggleImportant(id) {
        if (state.viewMode !== 'self') return;
        const q = state.allQuestions.find(qq => qq.id === id);
        if (!q) return;
        q.important = !q.important;

        if (state.useServer) {
            try { await api.updateQuestion(id, q); } catch (e) { toast('同步失败', 'error'); }
        } else {
            localStore.saveQuestions(state.currentUser.id, state.allQuestions);
        }
        renderAll();
    }

    async function deleteQuestion(id) {
        if (state.viewMode !== 'self') return;
        if (!confirm('确定要删除这道错题吗？此操作不可恢复。')) return;

        const q = state.allQuestions.find(qq => qq.id === id);
        if (state.useServer) {
            try {
                await api.deleteQuestion(id);
                if (q && q.imageId) {
                    try { await api.deleteImage(q.imageId); } catch (e) { /* 图片可能已不存在 */ }
                }
            } catch (e) {
                toast('删除失败: ' + e.message, 'error');
                return;
            }
        } else {
            if (q && q.imageId) localStore.deleteImage(state.currentUser.id, q.imageId);
            state.allQuestions = state.allQuestions.filter(qq => qq.id !== id);
            localStore.saveQuestions(state.currentUser.id, state.allQuestions);
        }

        state.allQuestions = state.allQuestions.filter(qq => qq.id !== id);
        toast('已删除', 'success');
        renderAll();
    }

        dom.editId.value = '';
        const fv = dom.filterSubject.value;
        if (fv !== 'all' && state.currentSubjects.includes(fv)) dom.modalSubject.value = fv;
        else if (state.currentSubjects.length) dom.modalSubject.value = state.currentSubjects[0];
        dom.modalCategory.value = '';
        dom.modalKnowledge.value = '';
        dom.modalLevel.value = 'medium';
        dom.modalQuestionText.value = '';
        dom.modalAnalysis.value = '';
        dom.modalImportant.checked = false;
        dom.modalImageFile.value = '';
        dom.imagePreviewContainer.innerHTML = '';

        state.currentEditImageId = null;

    function openEditModal(id) {
        const q = state.allQuestions.find(x => x.id === id);
        if (!q) return;
        dom.editId.value = q.id;
        dom.modalSubject.value = q.subject;

    async function loadExistingImage(imageId) {
        let dataUrl = null;
        if (state.viewMode === 'self' && state.useServer) {
            try {
                const res = await api.getImage(imageId);
                dataUrl = res.data;
            } catch (e) { /* 图片可能不存在 */ }
        } else if (state.viewMode === 'self' && !state.useServer) {
            const imgs = localStore.getImages(state.currentUser.id);
            dataUrl = imgs[imageId] || null;
        } else if (state.viewMode === 'other' && state.useServer) {
            try {
                const res = await api.getExploreImage(state.viewedUserId, imageId);
                dataUrl = res.data;
            } catch (e) { /* 图片可能不存在 */ }
        } else if (state.viewMode === 'other' && !state.useServer) {
            const imgs = localStore.getImages(state.viewedUserId);
            dataUrl = imgs[imageId] || null;
        }

        if (dataUrl) {
            state.currentImageDataUrl = dataUrl;
            const img = document.createElement('img');
            img.src = dataUrl;
            img.className = 'img-preview';
            dom.imagePreviewContainer.appendChild(img);
        }

    async function saveCurrentQuestion() {
        if (state.viewMode !== 'self') { toast('只读模式，无法修改', 'warning'); return; }
        const subject = dom.modalSubject.value;
        if (!subject) { toast('请选择科目', 'warning'); return; }

        const isEdit = !!dom.editId.value;
        const id = isEdit ? Number(dom.editId.value) : Date.now();
        let imageId = state.currentEditImageId;

        // 处理图片变更
        if (state.currentImageDataUrl) {
            if (isEdit && state.currentEditImageId && !dom.modalImageFile.files.length) {
                // 编辑模式且未更换图片，保持原 imageId
                imageId = state.currentEditImageId;
            } else {
                // 新图片或更换了图片
                imageId = `${id}_img_${Date.now()}`;
                if (state.useServer) {
                    try {
                        await api.uploadImage(imageId, state.currentImageDataUrl);
                    } catch (e) {
                        toast('图片上传失败: ' + e.message, 'error');
                        return;
                    }
                } else {
                    localStore.saveImage(state.currentUser.id, imageId, state.currentImageDataUrl);
                }
                // 删除旧图片
                if (isEdit && state.currentEditImageId && state.currentEditImageId !== imageId) {
                    if (state.useServer) {
                        try { await api.deleteImage(state.currentEditImageId); } catch (e) {}
                    } else {
                        localStore.deleteImage(state.currentUser.id, state.currentEditImageId);
                    }
                }
            }
        } else if (!state.currentImageDataUrl && isEdit && state.currentEditImageId) {
            // 编辑时删除了图片
            if (state.useServer) {
                try { await api.deleteImage(state.currentEditImageId); } catch (e) {}
            } else {
                localStore.deleteImage(state.currentUser.id, state.currentEditImageId);
            }
            imageId = null;
        }

        const q = {
            id,
            subject,
            category: dom.modalCategory.value.trim(),
            knowledgePoints: dom.modalKnowledge.value.trim(),
            level: dom.modalLevel.value,
            questionText: dom.modalQuestionText.value.trim(),
            analysis: dom.modalAnalysis.value.trim(),
            important: dom.modalImportant.checked,
            createTime: isEdit ? (state.allQuestions.find(qq => qq.id === id)?.createTime || Date.now()) : Date.now(),
            imageId,
        };

        if (state.useServer) {
            try {
                await api.saveQuestion(q);
                toast('保存成功', 'success');
            } catch (e) {
                toast('保存失败: ' + e.message, 'error');
                return;
            }
        } else {
            if (isEdit) {
                const idx = state.allQuestions.findIndex(qq => qq.id === id);
                if (idx !== -1) state.allQuestions[idx] = q;
            } else {
                state.allQuestions.push(q);
            }
            localStore.saveQuestions(state.currentUser.id, state.allQuestions);
            toast('保存成功（本地模式）', 'success');
        }

        // 刷新数据
        await loadAllQuestions();
        dom.questionModal.style.display = 'none';
        resetModal();
        renderAll();
    }

    // ───────── 导出/导入 ───────────────────────────────
    async function exportData() {
        if (state.viewMode !== 'self') { toast('只能在个人视图下导出', 'warning'); return; }
        try {
            let exportObj;
            if (state.useServer) {
                const res = await api.exportBackup();
                exportObj = res;
            } else {
                exportObj = {
                    questions: state.allQuestions,
                    images: localStore.getImages(state.currentUser.id),
                    subjects: state.currentSubjects,
                    user: state.currentUser.username,
                    exportVersion: '2.0-local',
                };
            }
            const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `mistake_backup_${state.currentUser.username}_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            toast('导出成功', 'success');
        } catch (e) {
            toast('导出失败: ' + e.message, 'error');
        }
    }

    function importData(file) {
        if (state.viewMode !== 'self') { toast('只能在个人视图下导入', 'warning'); return; }
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (!data.questions && !data.subjects) { toast('备份文件格式无效', 'error'); return; }

                if (state.useServer) {
                    await api.importBackup(data);
                    toast('导入成功！正在刷新...', 'success');
                } else {
                    if (data.questions) {
                        // 合并而不是覆盖
                        const existingIds = new Set(state.allQuestions.map(q => q.id));
                        for (const q of data.questions) {
                            if (existingIds.has(q.id)) {
                                const idx = state.allQuestions.findIndex(qq => qq.id === q.id);
                                state.allQuestions[idx] = { ...q, knowledgePoints: q.knowledgePoints || q.knowledge_points || '' };
                            } else {
                                state.allQuestions.push({ ...q, knowledgePoints: q.knowledgePoints || q.knowledge_points || '' });
                            }
                        }
                        localStore.saveQuestions(state.currentUser.id, state.allQuestions);
                    }
                    if (data.images) {
                        const imgs = localStore.getImages(state.currentUser.id);
                        Object.assign(imgs, data.images);
                        localStorage.setItem(LOCAL_KEYS.images(state.currentUser.id), JSON.stringify(imgs));
                    }
                    if (data.subjects) {
                        state.currentSubjects = data.subjects;
                        localStore.saveSubjects(state.currentUser.id, data.subjects);
                    }
                    toast('导入成功（本地模式）', 'success');
                }
                await loadAllQuestions();
                renderAll();
            } catch (err) {
                toast('导入失败: ' + err.message, 'error');
            }
        };
        reader.readAsText(file);
    }

    async function exploreUser(username) {
        if (!username) { toast('请输入用户名', 'warning'); return; }

        if (state.useServer) {
            try {
                const res = await api.getExploreUsers();
                const target = res.users.find(u => u.username === username);
                if (!target) { toast('用户不存在', 'error'); return; }
                if (target.id === state.currentUser.id) {
                    switchToSelfMode();
                } else {
                    await switchToOtherMode(target.id, target.username);
                }
            } catch (e) {
                toast('探索失败: ' + e.message, 'error');
            }
        } else {
            const users = localStore.getUsers();
            const target = users.find(u => u.username === username);
            if (!target) { toast('用户不存在', 'error'); return; }
            if (target.id === state.currentUser.id) {
                switchToSelfMode();
            } else {
                await switchToOtherMode(target.id, target.username);
            }
        }
    }

    // ───────── 服务器连接测试 ──────────────────────────
    async function testServerConnection() {
        const url = dom.serverUrl.value.trim();
        if (!url) {
            dom.serverHint.textContent = '留空则使用本地离线模式';
            dom.serverHint.style.color = '#94a3b8';
            return false;
        }
        try {
            const res = await fetch(url.replace(/\/+$/, '') + '/api/auth/me', {
                headers: { 'Content-Type': 'application/json' },
                signal: AbortSignal.timeout(5000),
            });
            if (res.status === 401 || res.ok) {
                dom.serverHint.textContent = '✅ 服务器连接成功';
                dom.serverHint.style.color = '#2b6e3c';
                return true;
            }
            throw new Error('异常状态码');
        } catch (e) {
            dom.serverHint.textContent = '❌ 无法连接服务器: ' + (e.message || '网络错误');
            dom.serverHint.style.color = '#bc3f2e';
            return false;
        }
    }

    // ───────── 登录后初始化 ─────────────────────────────
    async function afterLogin(user, token = null) {
        state.currentUser = user;
        state.token = token;
        state.useServer = !!token;
        state.viewMode = 'self';
        state.viewedUserId = null;
        state.viewedUserName = '';

        if (token) {
            state.serverUrl = dom.serverUrl.value.trim();
            localStorage.setItem('mistake_server_url', state.serverUrl);
            localStorage.setItem('mistake_token', token);
            showConnStatus('online', '✅ 已连接服务器 — 数据跨设备同步中');
        } else {
            showConnStatus('offline', '📴 离线模式 — 数据仅保存在本设备');
        }

        dom.currentUsername.textContent = user.username;
        dom.currentRole.textContent = user.role === 'admin' ? '管理员' : '用户';
        dom.adminPanelBtn.style.display = user.role === 'admin' ? 'inline-flex' : 'none';
        dom.newQuestionBtn.disabled = false;
        dom.exportBackupBtn.disabled = false;
        dom.importBackupBtn.disabled = false;
        dom.viewModeHint.innerHTML = '';
        dom.filterBar.classList.add('filter-collapsed');

        dom.authContainer.style.display = 'none';
        dom.mainApp.style.display = 'block';

        await refreshAllData();
    }

        const username = dom.loginUsername.value.trim();
        const password = dom.loginPassword.value;
        if (!username || !password) { toast('请填写用户名和密码', 'warning'); return; }

        const serverUrl = dom.serverUrl.value.trim();
        if (serverUrl) {
            state.serverUrl = serverUrl;
            try {
                const res = await api.login(username, password);
                await afterLogin(res.user, res.token);
                toast(`欢迎回来，${username}！`, 'success');
                return;
            } catch (e) {
                toast('服务器登录失败: ' + e.message, 'error');
                // 降级到本地登录
                toast('尝试本地登录...', 'info');
            }
        }

        // 本地登录
        try {
            const user = localStore.login(username, password);
            await afterLogin(user, null);
            toast(`欢迎回来，${username}！（离线模式）`, 'info');
        } catch (e) {
            toast(e.message, 'error');
        }
    };

    // 注册
    $('doRegisterBtn').onclick = async () => {
        const username = dom.regUsername.value.trim();
        const password = dom.regPassword.value;
        if (!username || !password) { toast('请填写用户名和密码', 'warning'); return; }
        if (username.length < 2 || username.length > 20) { toast('用户名需2-20个字符', 'warning'); return; }
        if (password.length < 4) { toast('密码至少4个字符', 'warning'); return; }

        const serverUrl = dom.serverUrl.value.trim();
        if (serverUrl) {
            state.serverUrl = serverUrl;
            try {
                await api.register(username, password);
                toast('注册成功！请登录', 'success');
                dom.backToLoginBtn.click();
                dom.loginUsername.value = username;
                dom.loginPassword.value = '';
                return;
            } catch (e) {
                if (e.message === '用户名已存在') {
                    toast('用户名已存在', 'error');
                    return;
                }
                toast('服务器注册失败: ' + e.message + '，尝试本地注册...', 'warning');
            }
        }

        // 本地注册
        try {
            localStore.register(username, password);
            toast('注册成功！请登录', 'success');
            dom.backToLoginBtn.click();
            dom.loginUsername.value = username;
            dom.loginPassword.value = '';
        } catch (e) {
            toast(e.message, 'error');
        }
    };

    // 登录/注册面板切换
    $('showRegisterBtn').onclick = (e) => { e.preventDefault(); dom.loginPanel.style.display = 'none'; dom.registerPanel.style.display = 'block'; };
    $('backToLoginBtn').onclick = (e) => { e.preventDefault(); dom.loginPanel.style.display = 'block'; dom.registerPanel.style.display = 'none'; };

    // 测试服务器连接
    $('testServerBtn').onclick = testServerConnection;

    // 退出
    $('logoutBtn').onclick = logout;

    // 管理员面板
    dom.adminPanelBtn.onclick = showAdminPanel;
    $('closeAdminModal').onclick = () => { dom.adminModal.style.display = 'none'; };

    // 新建错题
    $('newQuestionBtn').onclick = () => {
        if (state.viewMode !== 'self') { toast('只读模式无法新建', 'warning'); return; }
        resetModal();
        dom.questionModal.style.display = 'flex';
    };

    // 编辑模态框关闭
    $('cancelModalBtn').onclick = () => { dom.questionModal.style.display = 'none'; resetModal(); };

    // 保存错题
    $('saveQuestionBtn').onclick = saveCurrentQuestion;

    // 图片选择 + 压缩
    dom.modalImageFile.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
            toast('正在压缩图片...', 'info', 1000);
            const compressed = await compressImage(file);
            state.currentImageDataUrl = compressed;
            dom.imagePreviewContainer.innerHTML = '';
            const img = document.createElement('img');
            img.src = compressed;
            img.className = 'img-preview';
            dom.imagePreviewContainer.appendChild(img);
            const sizeKB = Math.round(compressed.length / 1024);
            const indicator = document.createElement('div');
            indicator.style.cssText = 'font-size:0.65rem;color:#2b6e3c;margin-top:4px;';
            indicator.textContent = `✅ 已压缩 (${sizeKB} KB)`;
            dom.imagePreviewContainer.appendChild(indicator);
        } catch (e) {
            toast('图片处理失败', 'error');
        }
    };

    // 新增科目
    $('addSubjectBtn').onclick = async () => {
        if (state.viewMode !== 'self') { toast('只读模式无法新增科目', 'warning'); return; }
        const newSub = prompt('请输入新科目名称：');
        if (!newSub || !newSub.trim()) return;
        const name = newSub.trim();
        if (state.currentSubjects.includes(name)) { toast('该科目已存在', 'warning'); return; }
        state.currentSubjects.push(name);

        if (state.useServer) {
            try { await api.updateSubjects(state.currentSubjects); } catch (e) { toast('同步失败: ' + e.message, 'error'); }
        } else {
            localStore.saveSubjects(state.currentUser.id, state.currentSubjects);
        }
        refreshSubjectSelects();
        toast(`已添加科目: ${name}`, 'success');
    };

    // 探索用户
    $('exploreBtn').onclick = () => exploreUser(dom.exploreUsername.value.trim());
    dom.exploreUsername.onkeydown = (e) => { if (e.key === 'Enter') exploreUser(dom.exploreUsername.value.trim()); };

    // 打印
    $('printPdfBtn').onclick = printPDF;

    // 导出
    $('exportBackupBtn').onclick = exportData;

    // 导入
    $('importBackupBtn').onclick = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.className = 'hidden-file-input';
        input.onchange = e => { if (e.target.files[0]) importData(e.target.files[0]); };
        document.body.appendChild(input);
        input.click();
        setTimeout(() => input.remove(), 100);
    };

    // 筛选事件
    dom.filterSubject.onchange = renderAll;
    dom.filterLevel.onchange = renderAll;
    dom.filterImportant.onchange = renderAll;
    dom.searchInput.oninput = renderAll;

    // 筛选折叠（移动端）
    dom.filterToggle.onclick = () => {
        dom.filterBar.classList.toggle('filter-collapsed');
        dom.filterToggle.textContent = dom.filterBar.classList.contains('filter-collapsed') ? '🔍 筛选与搜索 ▾' : '🔍 筛选与搜索 ▴';
    };

    // 关闭详情
    $('closeDetailBtn').onclick = () => { dom.detailModal.style.display = 'none'; };

    // 点击模态框背景关闭
    window.onclick = (e) => {
        if (e.target === dom.questionModal) { dom.questionModal.style.display = 'none'; resetModal(); }
        if (e.target === dom.detailModal) dom.detailModal.style.display = 'none';
        if (e.target === dom.adminModal) dom.adminModal.style.display = 'none';
    };

    // ESC 关闭模态框
    document.onkeydown = (e) => {
        if (e.key === 'Escape') {
            if (dom.questionModal.style.display === 'flex') { dom.questionModal.style.display = 'none'; resetModal(); }
            if (dom.detailModal.style.display === 'flex') dom.detailModal.style.display = 'none';
            if (dom.adminModal.style.display === 'flex') dom.adminModal.style.display = 'none';
        }
    };

    // ───────── 启动 ─────────────────────────────────────
    function init() {
        localStore.initUsers();

        // 恢复服务器地址
        const savedUrl = localStorage.getItem('mistake_server_url');
        if (savedUrl) dom.serverUrl.value = savedUrl;

        // 尝试恢复 Token
        const savedToken = localStorage.getItem('mistake_token');
        if (savedToken && savedUrl) {
            state.serverUrl = savedUrl;
            state.token = savedToken;
            // 验证 token 是否有效
            api.checkToken().then(res => {
                afterLogin(res.user, savedToken);
            }).catch(() => {
                // token 过期，清除
                localStorage.removeItem('mistake_token');
                state.token = null;
            });
        }

        // 显示登录页
        dom.authContainer.style.display = 'block';
        dom.mainApp.style.display = 'none';
        dom.loginPanel.style.display = 'block';
        dom.registerPanel.style.display = 'none';

        // 移动端默认折叠筛选
        if (window.innerWidth <= 768) {
            dom.filterBar.classList.add('filter-collapsed');
        } else {
            dom.filterBar.classList.remove('filter-collapsed');
        }
    }

    init();
})();
</script>
</body>
</html>
